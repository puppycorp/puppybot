name: Rust Build

on:
    push:
        branches:
            - "**"
    pull_request:
    workflow_call:
        outputs:
            artifact_name:
                description: ESP32 firmware artifact name
                value: ${{ jobs.esp32.outputs.artifact_name }}
            artifact_file:
                description: ESP32 firmware artifact filename
                value: ${{ jobs.esp32.outputs.artifact_file }}

jobs:
    esp32:
        runs-on: ubuntu-latest
        outputs:
            artifact_name: ${{ steps.package.outputs.artifact_name }}
            artifact_file: ${{ steps.package.outputs.artifact_file }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install ESP32 Rust toolchain
              working-directory: puppybot
              run: ./scripts/install.sh

            - name: Build ESP32 Rust firmware
              working-directory: puppybot
              run: ./scripts/build.sh release

            - name: Package firmware artifact
              id: package
              run: |
                  mkdir -p artifacts/esp32
                  cp puppybot/esp32/target/xtensa-esp32-none-elf/release/puppybot artifacts/esp32/
                  (cd artifacts/esp32 && zip -r ../puppybot-esp32-rust.zip .)
                  echo "artifact_name=puppybot-esp32-rust" >> "$GITHUB_OUTPUT"
                  echo "artifact_file=puppybot-esp32-rust.zip" >> "$GITHUB_OUTPUT"

            - name: Upload firmware artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ steps.package.outputs.artifact_name }}
                  path: artifacts/puppybot-esp32-rust.zip
                  if-no-files-found: error
                  retention-days: 14

    runtime:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Build runtime
              working-directory: puppybot
              run: cargo build --locked -p puppybot-runtime --release

            - name: Package runtime artifact
              run: |
                  mkdir -p artifacts/runtime
                  cp puppybot/target/release/puppybot-runtime artifacts/runtime/
                  (cd artifacts/runtime && zip -r ../puppybot-runtime.zip .)

            - name: Upload runtime artifact
              uses: actions/upload-artifact@v4
              with:
                  name: puppybot-runtime
                  path: artifacts/puppybot-runtime.zip
                  if-no-files-found: error
                  retention-days: 14
