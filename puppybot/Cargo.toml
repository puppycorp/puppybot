[package]
name = "puppybot"
version = "0.1.0"
edition = "2024"
resolver = "2"
rust-version = "1.88"

[[bin]]
name = "puppybot"
harness = false

[profile.release]
opt-level = "s"
debug = true
debug-assertions = true
lto = "fat"
codegen-units = 1

[profile.dev]
debug = true
opt-level = "z"

[dependencies]
esp-backtrace = { version = "0.19.0", features = ["panic-handler", "println"] }
esp-bootloader-esp-idf = "0.5.0"
esp-hal = { version = "1.1.1", features = ["log-04", "unstable"] }
esp-println = { version = "0.17.0", features = ["log-04"] }
log = "0.4"

[features]
default = ["esp32"]
esp32 = [
    "esp-backtrace/esp32",
    "esp-bootloader-esp-idf/esp32",
    "esp-hal/esp32",
    "esp-println/esp32",
]
